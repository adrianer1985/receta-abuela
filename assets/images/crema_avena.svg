<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffaf2" />
      <stop offset="100%" stop-color="#f7ede2" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Aloe Vera Leaf -->
    <path d="M 450,450 C 500,300 620,200 660,150 C 600,250 550,350 450,450 Z" fill="#55a630" stroke="#2c4e3d" stroke-width="3" />
    <!-- Aloe leaf spikes -->
    <line x1="550" y1="310" x2="558" y2="305" stroke="#2c4e3d" stroke-width="2" />
    <line x1="585" y1="260" x2="593" y2="253" stroke="#2c4e3d" stroke-width="2" />
    <line x1="620" y1="210" x2="628" y2="203" stroke="#2c4e3d" stroke-width="2" />
    
    <!-- Cosmetic Glass Jar -->
    <rect x="230" y="360" width="200" height="180" rx="20" fill="rgba(255, 255, 255, 0.9)" stroke="#7b9987" stroke-width="4" />
    <rect x="210" y="320" width="240" height="40" rx="10" fill="#2c4e3d" stroke="#1b3528" stroke-width="3" /> <!-- lid -->
    
    <!-- Smooth white cream paste inside -->
    <path d="M 250,510 L 410,510 L 410,410 Q 330,390 250,410 Z" fill="#fcfcfc" opacity="0.95" />
    <!-- Cream swirl -->
    <path d="M 300,440 Q 330,460 360,440" fill="none" stroke="#eaeaea" stroke-width="4" stroke-linecap="round" />
    
    <!-- Oat stalks (wheat-like shapes) -->
    <g transform="translate(180, 520) rotate(-35)">
      <path d="M 0,0 L 0,-150" stroke="#d4a373" stroke-width="3" />
      <ellipse cx="-10" cy="-60" rx="8" ry="15" fill="#d4a373" />
      <ellipse cx="10" cy="-80" rx="8" ry="15" fill="#d4a373" />
      <ellipse cx="-10" cy="-100" rx="8" ry="15" fill="#d4a373" />
      <ellipse cx="10" cy="-120" rx="8" ry="15" fill="#d4a373" />
      <ellipse cx="0" cy="-145" rx="7" ry="12" fill="#d4a373" />
    </g>
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">CREMA HIDRATANTE DE AVENA</text>
  </g>
</svg>