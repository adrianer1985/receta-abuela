<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f7f2" />
      <stop offset="100%" stop-color="#d9e2cf" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Ropes -->
    <line x1="320" y1="80" x2="320" y2="600" stroke="#b07c65" stroke-width="4" stroke-dasharray="8,4" />
    <line x1="480" y1="80" x2="480" y2="600" stroke="#b07c65" stroke-width="4" stroke-dasharray="8,4" />
    
    <!-- Bottle 1 -->
    <g transform="translate(0, 160)">
      <rect x="280" y="0" width="240" height="100" rx="20" fill="rgba(255, 255, 255, 0.7)" stroke="#7b9987" stroke-width="3" />
      <rect x="520" y="35" width="20" height="30" fill="rgba(255, 255, 255, 0.7)" stroke="#7b9987" stroke-width="2" />
      <rect x="540" y="38" width="8" height="24" fill="#2c4e3d" />
      <!-- Cutout filled with Soil -->
      <rect x="310" y="20" width="180" height="65" rx="5" fill="#664422" />
      <!-- Sprouts -->
      <path d="M 350,20 C 340,-20 370,-20 360,20" fill="#55a630" stroke="#2c4e3d" stroke-width="2" />
      <path d="M 400,20 C 390,-30 420,-30 410,20" fill="#55a630" stroke="#2c4e3d" stroke-width="2" />
      <path d="M 450,20 C 440,-15 470,-15 460,20" fill="#55a630" stroke="#2c4e3d" stroke-width="2" />
    </g>

    <!-- Bottle 2 -->
    <g transform="translate(0, 360)">
      <rect x="280" y="0" width="240" height="100" rx="20" fill="rgba(255, 255, 255, 0.7)" stroke="#7b9987" stroke-width="3" />
      <rect x="520" y="35" width="20" height="30" fill="rgba(255, 255, 255, 0.7)" stroke="#7b9987" stroke-width="2" />
      <rect x="540" y="38" width="8" height="24" fill="#2c4e3d" />
      <!-- Cutout filled with Soil -->
      <rect x="310" y="20" width="180" height="65" rx="5" fill="#664422" />
      <!-- Sprouts -->
      <path d="M 350,20 C 330,-30 360,-20 360,20 M 360,20 C 380,-10 360,10 360,20" fill="#55a630" stroke="#2c4e3d" stroke-width="2" />
      <path d="M 410,20 C 390,-25 430,-25 410,20" fill="#55a630" stroke="#2c4e3d" stroke-width="2" />
      <path d="M 450,20 C 430,-30 470,-20 460,20" fill="#55a630" stroke="#2c4e3d" stroke-width="2" />
    </g>
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">HUERTO VERTICAL DE BOTELLAS</text>
  </g>
</svg>