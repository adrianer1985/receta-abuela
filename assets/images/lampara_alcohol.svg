<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c2621" />
      <stop offset="100%" stop-color="#0d110f" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Soft background glow of light -->
    <circle cx="400" cy="300" r="300" fill="#ffb300" opacity="0.1" filter="url(#glow)" />
    <circle cx="400" cy="300" r="120" fill="#ffcc00" opacity="0.15" filter="url(#glow)" />
    
    <!-- Small Glass Jar (Alcohol Lamp) -->
    <path d="M 330,340 Q 330,380 290,410 L 290,560 A 25,25 0 0 0 315,585 L 485,585 A 25,25 0 0 0 510,560 L 510,410 Q 470,380 470,340 Z" fill="rgba(255, 255, 255, 0.18)" stroke="rgba(140, 184, 159, 0.4)" stroke-width="3" />
    
    <!-- Liquid fuel level inside (translucent blue-ish/clear) -->
    <path d="M 293,460 L 507,460 L 507,560 A 20,20 0 0 1 487,580 L 313,580 A 20,20 0 0 1 293,560 Z" fill="rgba(0, 176, 255, 0.15)" stroke="rgba(0, 176, 255, 0.2)" stroke-width="1" />
    
    <!-- Metal cap with wick holder -->
    <rect x="360" y="320" width="80" height="25" rx="4" fill="#a0a0a0" stroke="#707070" stroke-width="2" />
    <rect x="390" y="290" width="20" height="30" fill="#808080" />
    
    <!-- Cotton Wick -->
    <rect x="393" y="310" width="14" height="200" fill="#eaeaea" stroke="#cccccc" stroke-width="1" />
    
    <!-- Glowing Flame -->
    <g filter="url(#glow)" transform="translate(0, 10)">
      <!-- Outer Flame -->
      <path d="M 400,290 C 370,220 400,120 400,120 C 400,120 430,220 400,290 Z" fill="#ff9900" opacity="0.9" />
      <!-- Inner core -->
      <path d="M 400,290 C 385,240 400,180 400,180 C 400,180 415,240 400,290 Z" fill="#ffff00" />
      <!-- Blue root -->
      <ellipse cx="400" cy="285" rx="15" ry="6" fill="#00b0ff" opacity="0.8" />
    </g>
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">LÁMPARA DE ALCOHOL DE EMERGENCIA</text>
  </g>
</svg>