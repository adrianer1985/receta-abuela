<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <!-- Background with soft gradient matching the site style -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f3ee" />
      <stop offset="100%" stop-color="#e6e5db" />
    </linearGradient>
    <linearGradient id="bottleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.7)" />
      <stop offset="30%" stop-color="rgba(210, 240, 230, 0.5)" />
      <stop offset="70%" stop-color="rgba(210, 240, 230, 0.3)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.6)" />
    </linearGradient>
    <linearGradient id="soilGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4d3319" />
      <stop offset="50%" stop-color="#664422" />
      <stop offset="100%" stop-color="#332211" />
    </linearGradient>
    <linearGradient id="leafGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#99cc33" />
      <stop offset="100%" stop-color="#4d661a" />
    </linearGradient>
    <linearGradient id="leafGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#80cc28" />
      <stop offset="100%" stop-color="#336614" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Wooden Wall Planks -->
  <g stroke="#d5d3c8" stroke-width="2" opacity="0.6">
    <line x1="200" y1="0" x2="200" y2="800" />
    <line x1="400" y1="0" x2="400" y2="800" />
    <line x1="600" y1="0" x2="600" y2="800" />
  </g>

  <!-- Hanging Ropes -->
  <g stroke="#8c7a6b" stroke-width="4" stroke-dasharray="4,2">
    <line x1="330" y1="0" x2="330" y2="800" />
    <line x1="470" y1="0" x2="470" y2="800" />
  </g>

  <!-- Stacked Bottles Group -->
  <!-- Bottle 1 (Top) -->
  <g transform="translate(0, 80)" filter="url(#shadow)">
    <!-- Hanging loops -->
    <path d="M 330,-40 L 330,40 M 470,-40 L 470,40" stroke="#8c7a6b" stroke-width="4" />
    
    <!-- Bottle Body (horizontal PET bottle) -->
    <rect x="300" y="0" width="200" height="120" rx="30" fill="url(#bottleGrad)" stroke="rgba(44, 78, 61, 0.2)" stroke-width="2" />
    <!-- Bottle Neck & Cap -->
    <rect x="500" y="45" width="25" height="30" rx="4" fill="url(#bottleGrad)" stroke="rgba(44, 78, 61, 0.2)" stroke-width="2" />
    <rect x="525" y="48" width="10" height="24" rx="2" fill="#2c4e3d" />
    
    <!-- Cutout opening showing Soil -->
    <rect x="330" y="30" width="140" height="75" rx="10" fill="url(#soilGrad)" />
    
    <!-- Plants inside -->
    <!-- Leaf Left -->
    <path d="M 360,40 C 330,10 330,-20 360,-10 C 375,-5 375,20 370,40" fill="url(#leafGrad1)" />
    <!-- Leaf Right -->
    <path d="M 440,40 C 470,10 470,-20 440,-10 C 425,-5 425,20 430,40" fill="url(#leafGrad2)" />
    <!-- Leaf Center -->
    <path d="M 400,45 C 380,5 400,-35 400,-35 C 400,-35 420,5 400,45" fill="url(#leafGrad1)" />
    
    <!-- Water Drips -->
    <circle cx="400" cy="115" r="4" fill="#66ccff" opacity="0.8" />
  </g>

  <!-- Bottle 2 (Middle) -->
  <g transform="translate(0, 310)" filter="url(#shadow)">
    <!-- Hanging loops -->
    <path d="M 330,-40 L 330,40 M 470,-40 L 470,40" stroke="#8c7a6b" stroke-width="4" />
    
    <!-- Bottle Body -->
    <rect x="300" y="0" width="200" height="120" rx="30" fill="url(#bottleGrad)" stroke="rgba(44, 78, 61, 0.2)" stroke-width="2" />
    <!-- Bottle Neck & Cap -->
    <rect x="500" y="45" width="25" height="30" rx="4" fill="url(#bottleGrad)" stroke="rgba(44, 78, 61, 0.2)" stroke-width="2" />
    <rect x="525" y="48" width="10" height="24" rx="2" fill="#2c4e3d" />
    
    <!-- Cutout opening showing Soil -->
    <rect x="330" y="30" width="140" height="75" rx="10" fill="url(#soilGrad)" />
    
    <!-- Plants inside (different style) -->
    <!-- Leaf Left -->
    <path d="M 355,45 C 325,15 320,-15 350,-5 C 365,0 365,25 365,45" fill="url(#leafGrad2)" />
    <!-- Leaf Right -->
    <path d="M 445,45 C 475,15 480,-15 450,-5 C 435,0 435,25 435,45" fill="url(#leafGrad1)" />
    <!-- Leaf Center -->
    <path d="M 400,45 C 385,15 390,-30 400,-30 C 410,-30 415,15 400,45" fill="url(#leafGrad2)" />
    <path d="M 385,45 C 375,25 380,0 385,0 C 390,0 395,25 385,45" fill="url(#leafGrad1)" />
    <path d="M 415,45 C 405,25 410,0 415,0 C 420,0 425,25 415,45" fill="url(#leafGrad2)" />
    
    <!-- Water Drips -->
    <circle cx="400" cy="115" r="4" fill="#66ccff" opacity="0.8" />
  </g>

  <!-- Bottle 3 (Bottom) -->
  <g transform="translate(0, 540)" filter="url(#shadow)">
    <!-- Hanging loops -->
    <path d="M 330,-40 L 330,40 M 470,-40 L 470,40" stroke="#8c7a6b" stroke-width="4" />
    
    <!-- Bottle Body -->
    <rect x="300" y="0" width="200" height="120" rx="30" fill="url(#bottleGrad)" stroke="rgba(44, 78, 61, 0.2)" stroke-width="2" />
    <!-- Bottle Neck & Cap -->
    <rect x="500" y="45" width="25" height="30" rx="4" fill="url(#bottleGrad)" stroke="rgba(44, 78, 61, 0.2)" stroke-width="2" />
    <rect x="525" y="48" width="10" height="24" rx="2" fill="#2c4e3d" />
    
    <!-- Cutout opening showing Soil -->
    <rect x="330" y="30" width="140" height="75" rx="10" fill="url(#soilGrad)" />
    
    <!-- Plants inside -->
    <!-- Leaf Left -->
    <path d="M 360,40 C 330,10 330,-20 360,-10 C 375,-5 375,20 370,40" fill="url(#leafGrad1)" />
    <!-- Leaf Right -->
    <path d="M 440,40 C 470,10 470,-20 440,-10 C 425,-5 425,20 430,40" fill="url(#leafGrad2)" />
    <!-- Leaf Center -->
    <path d="M 400,45 C 380,5 400,-35 400,-35 C 400,-35 420,5 400,45" fill="url(#leafGrad1)" />
  </g>

  <!-- Title Badge overlay at the bottom -->
  <rect x="250" y="720" width="300" height="50" rx="25" fill="#2c4e3d" />
  <text x="400" y="752" font-family="'Outfit', sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">HUERTO VERTICAL RECICLADO</text>
</svg>
