<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf5fc" />
      <stop offset="100%" stop-color="#eedef2" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Decorative Lavender flowers on background -->
    <g transform="translate(220, 280) rotate(-20)" opacity="0.8">
      <path d="M 0,0 Q 50,-100 100,-200" fill="none" stroke="#52705e" stroke-width="3" />
      <circle cx="100" cy="-200" r="8" fill="#a385e0" />
      <circle cx="95" cy="-180" r="7" fill="#a385e0" />
      <circle cx="85" cy="-160" r="8" fill="#8d66cc" />
    </g>
    
    <!-- Decorative Plate -->
    <ellipse cx="400" cy="510" rx="220" ry="60" fill="#ffffff" stroke="#d5d3c8" stroke-width="4" />
    <ellipse cx="400" cy="510" rx="180" ry="42" fill="#f0ede6" />
    
    <!-- Three White Deodorizer Blocks (round flower shapes or pucks) -->
    <!-- Block 1 (Left) -->
    <g transform="translate(300, 480)">
      <rect x="-50" y="-30" width="100" height="60" rx="15" fill="#fcfcfc" stroke="#e0e0e0" stroke-width="2" />
      <ellipse cx="0" cy="-30" rx="50" ry="15" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" />
      <!-- Flower detail in middle of block -->
      <circle cx="0" cy="-30" r="8" fill="#a385e0" />
    </g>
    
    <!-- Block 2 (Right) -->
    <g transform="translate(480, 490)">
      <rect x="-40" y="-30" width="80" height="55" rx="12" fill="#fcfcfc" stroke="#e0e0e0" stroke-width="2" />
      <ellipse cx="0" cy="-30" rx="40" ry="12" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" />
      <circle cx="0" cy="-30" r="6" fill="#a385e0" />
    </g>

    <!-- Block 3 (Center Front) -->
    <g transform="translate(390, 520)">
      <rect x="-50" y="-30" width="100" height="60" rx="15" fill="#ffffff" stroke="#dcdcdc" stroke-width="3" />
      <ellipse cx="0" cy="-30" rx="50" ry="15" fill="#fcfcfc" stroke="#dcdcdc" stroke-width="3" />
      <circle cx="0" cy="-30" r="10" fill="#b07c65" opacity="0.3" /> <!-- calendula petal style -->
      <circle cx="0" cy="-30" r="4" fill="#ffb300" />
    </g>
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">BLOQUES AMBIENTADORES DE WC Y HOGAR</text>
  </g>
</svg>