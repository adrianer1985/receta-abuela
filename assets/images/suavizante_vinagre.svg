<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2f7f4" />
      <stop offset="100%" stop-color="#dae8e0" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Towels -->
    <rect x="250" y="420" width="300" height="60" rx="10" fill="#ffffff" />
    <rect x="230" y="470" width="340" height="70" rx="12" fill="#f5f5f5" />
    <rect x="210" y="530" width="380" height="80" rx="15" fill="#eaeaea" stroke="#dcdcdc" stroke-width="2" />
    <path d="M 210,570 C 230,550 250,550 270,570" fill="none" stroke="#2c4e3d" stroke-width="3" opacity="0.3" />
    
    <!-- Glass Bottle -->
    <path d="M 450,220 L 450,260 L 480,290 L 480,480 A 15,15 0 0 1 465,495 L 335,495 A 15,15 0 0 1 320,480 L 320,290 L 350,260 L 350,220 Z" fill="rgba(255, 255, 255, 0.75)" stroke="#7b9987" stroke-width="3" />
    <rect x="340" y="290" width="120" height="180" fill="rgba(255, 255, 255, 0.5)" />
    <!-- Cork -->
    <rect x="375" y="195" width="50" height="25" rx="5" fill="#b07c65" />
    
    <!-- Lavender branch leaning on the bottle -->
    <path d="M 280,510 Q 300,380 320,240" fill="none" stroke="#52705e" stroke-width="3" />
    <circle cx="320" cy="240" r="10" fill="#a385e0" />
    <circle cx="315" cy="260" r="9" fill="#a385e0" />
    <circle cx="325" cy="270" r="8" fill="#8d66cc" />
    <circle cx="310" cy="290" r="9" fill="#8d66cc" />
    <circle cx="318" cy="310" r="8" fill="#a385e0" />
    <circle cx="308" cy="330" r="9" fill="#7547b8" />
    
    <!-- Lemon Slice -->
    <circle cx="530" cy="510" r="45" fill="#f8e038" stroke="#dcb810" stroke-width="3" />
    <circle cx="530" cy="510" r="37" fill="#fff9aa" />
    <path d="M 530,465 L 530,555 M 485,510 L 575,510" stroke="#f8e038" stroke-width="2" />
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">SUAVIZANTE DE VINAGRE Y BICARBONATO</text>
  </g>
</svg>