<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbf5fc" />
      <stop offset="100%" stop-color="#ece0f2" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Moon and Stars sleep symbol -->
    <g transform="translate(560, 200)" opacity="0.15">
      <path d="M 0,-40 A 40,40 0 1 0 40,0 A 30,30 0 1 1 0,-40 Z" fill="#7547b8" />
    </g>
    
    <!-- Steam Curves (hot tea) -->
    <g stroke="#8d66cc" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.3">
      <path d="M 370,260 Q 360,200 380,140" />
      <path d="M 400,260 Q 410,190 390,130" />
      <path d="M 430,260 Q 420,200 440,140" />
    </g>
    
    <!-- Ceramic Mug -->
    <rect x="310" y="320" width="180" height="220" rx="20" fill="#fcfbf9" stroke="#7547b8" stroke-width="4" />
    <!-- Mug Handle -->
    <path d="M 490,360 C 540,360 540,480 490,480" fill="none" stroke="#fcfbf9" stroke-width="18" />
    <path d="M 490,360 C 540,360 540,480 490,480" fill="none" stroke="#7547b8" stroke-width="4" />
    
    <!-- Tea Bag String and Tag hanging out -->
    <path d="M 360,320 Q 330,350 280,390" fill="none" stroke="#b07c65" stroke-width="2.5" />
    <rect x="255" y="390" width="30" height="40" rx="3" fill="#ffffff" stroke="#b07c65" stroke-width="2" />
    <line x1="265" y1="410" x2="275" y2="410" stroke="#7547b8" stroke-width="3" />
    
    <!-- Valerian Root/Flowers on wood table -->
    <g transform="translate(230, 520) rotate(15)">
      <!-- Root logs -->
      <line x1="0" y1="0" x2="100" y2="0" stroke="#7a5230" stroke-width="12" stroke-linecap="round" />
      <line x1="20" y1="20" x2="90" y2="20" stroke="#5c3d24" stroke-width="10" stroke-linecap="round" />
    </g>
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">INFUSIÓN RELAJANTE DE VALERIANA</text>
  </g>
</svg>