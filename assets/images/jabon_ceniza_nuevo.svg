<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f5f3" />
      <stop offset="100%" stop-color="#dedcd8" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Firewood logs in background -->
    <rect x="180" y="460" width="180" height="45" rx="5" fill="#5c3d24" stroke="#3d2817" stroke-width="3" transform="rotate(-10, 270, 480)" />
    <circle cx="340" cy="425" r="20" fill="#7a5230" stroke="#3d2817" stroke-width="3" />
    <!-- Rings in log -->
    <circle cx="340" cy="425" r="12" fill="none" stroke="#5c3d24" stroke-width="2" />
    <circle cx="340" cy="425" r="6" fill="none" stroke="#5c3d24" stroke-width="1.5" />
    
    <!-- Ash Pile (dark grey polygon/hills) -->
    <path d="M 420,530 Q 520,440 620,530 Z" fill="#808080" opacity="0.8" />
    <path d="M 450,530 Q 520,465 590,530 Z" fill="#a0a0a0" opacity="0.7" />
    
    <!-- Solid rustic handmade soap bar (foreground) -->
    <path d="M 240,430 L 440,380 L 500,420 L 500,510 L 300,560 L 240,510 Z" fill="#ebdcb9" stroke="#b07c65" stroke-width="4" />
    <!-- Bar dimensions -->
    <path d="M 440,380 L 440,470 L 300,560" fill="none" stroke="#b07c65" stroke-width="3" />
    <path d="M 440,470 L 500,420" fill="none" stroke="#b07c65" stroke-width="3" />
    
    <!-- Olive sprig on top of soap -->
    <g transform="translate(370, 410) scale(0.7)">
      <path d="M 0,0 C -20,-20 -30,0 0,0" fill="#3a5f0b" />
      <path d="M 0,0 C 20,-20 30,0 0,0" fill="#3a5f0b" />
    </g>
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">JABÓN DE CENIZA Y OLIVA</text>
  </g>
</svg>