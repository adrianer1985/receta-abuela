<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbfbf5" />
      <stop offset="100%" stop-color="#ebebe0" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Tree branch (hanging trap) -->
    <path d="M 100,100 Q 400,150 700,100" fill="none" stroke="#5c3d24" stroke-width="14" stroke-linecap="round" />
    <!-- Hanging string -->
    <line x1="400" y1="125" x2="400" y2="240" stroke="#8B5A2B" stroke-width="3" />
    
    <!-- PET Bottle Wasp Trap (inverted top design) -->
    <g transform="translate(320, 240)">
      <!-- Main plastic bottle body -->
      <rect x="0" y="0" width="160" height="280" rx="20" fill="rgba(255, 255, 255, 0.65)" stroke="#7b9987" stroke-width="4" />
      
      <!-- Inverted funnel top inside the bottle -->
      <path d="M 5,50 L 155,50 L 110,130 L 110,170 L 50,170 L 50,130 Z" fill="rgba(255, 255, 255, 0.8)" stroke="#7b9987" stroke-width="2" />
      
      <!-- Sweet syrup liquid inside the bottom of the bottle -->
      <path d="M 3,210 L 157,210 L 157,265 A 15,15 0 0 1 142,280 L 18,280 A 15,15 0 0 1 3,265 Z" fill="#ffb300" opacity="0.8" />
    </g>
    
    <!-- Wasps flying around the trap -->
    <!-- Wasp 1 (Right) -->
    <g transform="translate(540, 280) rotate(-15)">
      <ellipse cx="0" cy="0" rx="15" ry="8" fill="#ffd54f" stroke="#000000" stroke-width="1.5" />
      <!-- stripes -->
      <line x1="-5" y1="-7" x2="-5" y2="7" stroke="#000000" stroke-width="3" />
      <line x1="5" y1="-7" x2="5" y2="7" stroke="#000000" stroke-width="3" />
      <!-- Wings -->
      <path d="M 0,-5 C 5,-20 -20,-20 0,-5" fill="#e0f7fa" opacity="0.8" stroke="#00b0ff" />
    </g>
    
    <!-- Wasp 2 (Left) -->
    <g transform="translate(260, 360) rotate(35) scale(0.8)">
      <ellipse cx="0" cy="0" rx="15" ry="8" fill="#ffd54f" stroke="#000000" stroke-width="1.5" />
      <line x1="-5" y1="-7" x2="-5" y2="7" stroke="#000000" stroke-width="3" />
      <line x1="5" y1="-7" x2="5" y2="7" stroke="#000000" stroke-width="3" />
      <path d="M 0,-5 C 5,-20 -20,-20 0,-5" fill="#e0f7fa" opacity="0.8" stroke="#00b0ff" />
    </g>
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">TRAMPA CASERA PARA AVISPAS</text>
  </g>
</svg>