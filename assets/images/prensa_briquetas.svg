<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#edece8" />
      <stop offset="100%" stop-color="#d0cec5" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b0b0b0" />
      <stop offset="50%" stop-color="#e8e8e8" />
      <stop offset="100%" stop-color="#808080" />
    </linearGradient>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Rustic Wood Table Base -->
    <rect x="100" y="550" width="600" height="100" fill="#8B5A2B" stroke="#4a311c" stroke-width="4" />
    
    <!-- Briquetas (Blocks of paper) -->
    <rect x="150" y="450" width="130" height="100" rx="10" fill="#a0a0a0" stroke="#707070" stroke-width="3" />
    <line x1="165" y1="475" x2="265" y2="475" stroke="#707070" stroke-width="3" stroke-dasharray="8,4" />
    <line x1="165" y1="510" x2="265" y2="510" stroke="#707070" stroke-width="3" stroke-dasharray="8,4" />

    <rect x="180" y="380" width="130" height="100" rx="10" fill="#b8b8b8" stroke="#888888" stroke-width="3" />
    
    <!-- Mechanical Metal Press -->
    <!-- Frame -->
    <rect x="420" y="200" width="30" height="350" fill="#404040" />
    <rect x="550" y="200" width="30" height="350" fill="#404040" />
    <rect x="400" y="200" width="200" height="40" fill="#303030" />
    <!-- Press Screw/Piston -->
    <rect x="485" y="120" width="30" height="280" fill="url(#metalGrad)" stroke="#202020" stroke-width="2" />
    <!-- Press Plate -->
    <rect x="440" y="400" width="120" height="30" rx="5" fill="#303030" />
    <!-- Handle bar at top -->
    <path d="M 400,120 L 600,120" stroke="#303030" stroke-width="12" stroke-linecap="round" />
    <circle cx="400" cy="120" r="15" fill="#b07c65" />
    <circle cx="600" cy="120" r="15" fill="#b07c65" />
    
    <!-- Paper pulp / compressing brick inside press -->
    <rect x="450" y="430" width="100" height="120" fill="#909090" opacity="0.9" />
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">PRENSA DE PAPEL Y BRIQUETAS</text>
  </g>
</svg>