<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdfaf2" />
      <stop offset="100%" stop-color="#f5ecd0" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Wooden Table Grain Background -->
    <g stroke="#d5c7b0" stroke-width="3" opacity="0.4">
      <path d="M 100,500 C 300,480 500,520 700,500" fill="none" />
      <path d="M 100,560 C 300,540 500,580 700,560" fill="none" />
      <path d="M 100,620 C 300,600 500,640 700,620" fill="none" />
    </g>
    
    <!-- Spray bottle of wood cleaner -->
    <g transform="translate(420, 200)">
      <rect x="0" y="100" width="100" height="240" rx="20" fill="rgba(255, 255, 255, 0.85)" stroke="#7b9987" stroke-width="3" />
      <rect x="10" y="130" width="80" height="190" fill="#fff5cc" opacity="0.8" /> <!-- Lemon-olive yellowish oil mix -->
      
      <!-- Label -->
      <rect x="10" y="180" width="80" height="60" rx="5" fill="#2c4e3d" />
      <line x1="20" y1="210" x2="70" y2="210" stroke="#ffffff" stroke-width="3" />
      
      <!-- Spray head -->
      <path d="M 50,100 L 50,60 L 20,60 L 10,75 L -10,75 L -20,55 L 70,55 L 70,100 Z" fill="#303030" stroke="#101010" stroke-width="1.5" />
      <path d="M 10,60 L 10,90" stroke="#303030" stroke-width="4" stroke-linecap="round" />
    </g>
    
    <!-- Fresh Lemon slice -->
    <circle cx="230" cy="460" r="50" fill="#f8e038" stroke="#dcb810" stroke-width="3" />
    <circle cx="230" cy="460" r="42" fill="#fff9aa" />
    <path d="M 230,410 L 230,510 M 180,460 L 280,460" stroke="#f8e038" stroke-width="2" />
    
    <!-- Olive Oil jug (small) -->
    <path d="M 350,420 C 350,380 320,380 320,340 A 10,10 0 0 0 310,330 L 290,330 A 10,10 0 0 0 280,340 C 280,380 250,380 250,420 A 50,50 0 0 0 300,470 A 50,50 0 0 0 350,420 Z" fill="#ffd54f" opacity="0.85" stroke="#b07c65" stroke-width="2" />
    <rect x="285" y="315" width="30" height="15" rx="3" fill="#b07c65" />
    
    <!-- Sparkles of shine on wood (crosses) -->
    <g stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.9">
      <line x1="180" y1="360" x2="180" y2="390" />
      <line x1="165" y1="375" x2="195" y2="375" />
      
      <line x1="330" y1="280" x2="330" y2="300" stroke-width="2" />
      <line x1="320" y1="290" x2="340" y2="290" stroke-width="2" />
    </g>
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">LIMPIAMADERAS DE LIMÓN Y OLIVA</text>
  </g>
</svg>