<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6faf8" />
      <stop offset="100%" stop-color="#e1ede6" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Small Jar of White Clay Powder -->
    <rect x="250" y="360" width="180" height="160" rx="20" fill="rgba(255, 255, 255, 0.85)" stroke="#7b9987" stroke-width="3" />
    <rect x="240" y="320" width="200" height="40" rx="8" fill="#b07c65" /> <!-- Cork Lid -->
    
    <!-- White powder line inside jar -->
    <path d="M 260,490 L 420,490 L 420,420 Q 340,410 260,420 Z" fill="#f8f9fa" opacity="0.95" stroke="#e9ecef" stroke-width="2" />
    
    <!-- Bamboo Toothbrush -->
    <g transform="translate(320, 300) rotate(-35)">
      <!-- Handle -->
      <rect x="0" y="0" width="25" height="360" rx="10" fill="#d2a373" stroke="#b07c65" stroke-width="2" />
      <!-- Head and White Bristles -->
      <rect x="-5" y="-30" width="35" height="45" rx="5" fill="#d2a373" />
      <path d="M -5,-30 C -5,-50 10,-55 10,-30" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" />
      <path d="M 10,-30 C 10,-55 25,-55 25,-30" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" />
      <path d="M 25,-30 C 25,-50 35,-45 35,-30" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" />
      
      <!-- Dab of white/mint paste on bristles -->
      <path d="M -2,-42 C 10,-55 25,-45 30,-38" fill="none" stroke="#a2e3c4" stroke-width="8" stroke-linecap="round" />
    </g>
    
    <!-- Mint leaves -->
    <g transform="translate(220, 480) scale(0.8)">
      <path d="M 0,0 C -30,-30 -60,-10 -50,20 C -20,25 -5,10 0,0" fill="#55a630" stroke="#2c4e3d" stroke-width="2" />
      <circle cx="-10" cy="5" r="2" fill="#ffffff" opacity="0.3" />
    </g>
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">POLVO DENTÍFRICO DE ARCILLA BLANCA</text>
  </g>
</svg>