<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf5ef" />
      <stop offset="100%" stop-color="#eddcd2" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Almonds background -->
    <ellipse cx="220" cy="480" rx="30" ry="18" fill="#d2a373" stroke="#b07c65" stroke-width="2" transform="rotate(-30, 220, 480)" />
    <ellipse cx="250" cy="510" rx="25" ry="15" fill="#d2a373" stroke="#b07c65" stroke-width="2" transform="rotate(15, 250, 510)" />
    
    <!-- Scrub Jar (containing dark brown coffee pulp) -->
    <rect x="310" y="340" width="220" height="200" rx="25" fill="rgba(255, 255, 255, 0.85)" stroke="#7b9987" stroke-width="4" />
    <rect x="290" y="300" width="260" height="40" rx="8" fill="#b07c65" stroke="#7a5230" stroke-width="3" /> <!-- Lid -->
    
    <!-- Coffee scrub paste inside jar -->
    <path d="M 330,515 L 510,515 L 510,400 Q 420,385 330,400 Z" fill="#3d2612" opacity="0.95" />
    <!-- Textured dots in scrub -->
    <g fill="#1f1005">
      <circle cx="360" cy="440" r="3" />
      <circle cx="390" cy="460" r="4" />
      <circle cx="430" cy="430" r="3" />
      <circle cx="460" cy="470" r="4" />
      <circle cx="480" cy="440" r="3" />
      <circle cx="410" cy="480" r="3" />
    </g>
    
    <!-- Roasted Coffee Beans -->
    <g transform="translate(520, 500) rotate(25)">
      <ellipse cx="0" cy="0" rx="25" ry="18" fill="#4a2c11" stroke="#2c1705" stroke-width="2" />
      <path d="M -23,0 Q 0,10 23,0" fill="none" stroke="#2c1705" stroke-width="2" /> <!-- S groove -->
    </g>
    <g transform="translate(565, 470) rotate(-15) scale(0.8)">
      <ellipse cx="0" cy="0" rx="25" ry="18" fill="#4a2c11" stroke="#2c1705" stroke-width="2" />
      <path d="M -23,0 Q 0,10 23,0" fill="none" stroke="#2c1705" stroke-width="2" />
    </g>
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">EXFOLIANTE CORPORAL DE CAFÉ</text>
  </g>
</svg>