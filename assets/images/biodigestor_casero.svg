<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8edf2" />
      <stop offset="100%" stop-color="#cedbe7" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Large Blue Drum -->
    <rect x="260" y="220" width="280" height="380" rx="40" fill="#2c699a" stroke="#143c5c" stroke-width="5" />
    
    <!-- Metal ribs on drum -->
    <line x1="260" y1="320" x2="540" y2="320" stroke="#143c5c" stroke-width="4" />
    <line x1="260" y1="440" x2="540" y2="440" stroke="#143c5c" stroke-width="4" />
    <line x1="260" y1="520" x2="540" y2="520" stroke="#143c5c" stroke-width="4" />
    
    <!-- Inlet feeding pipe (left) -->
    <path d="M 180,180 L 280,280" stroke="#707070" stroke-width="18" stroke-linecap="round" />
    <path d="M 170,160 L 210,200" stroke="#303030" stroke-width="6" />
    
    <!-- Gas Outlet (top) -->
    <path d="M 400,220 L 400,140 L 520,140" fill="none" stroke="#ff9900" stroke-width="10" stroke-linejoin="round" />
    
    <!-- Pressure Gauge -->
    <circle cx="520" cy="140" r="35" fill="#ffffff" stroke="#303030" stroke-width="3" />
    <!-- Gauge details -->
    <path d="M 495,140 A 25,25 0 0 1 545,140" fill="none" stroke="#d01000" stroke-width="4" />
    <line x1="520" y1="140" x2="535" y2="120" stroke="#303030" stroke-width="3" stroke-linecap="round" /> <!-- needle -->
    <circle cx="520" cy="140" r="4" fill="#303030" />
    
    <!-- Gas Metano text badge on drum -->
    <rect x="330" y="360" width="140" height="50" rx="10" fill="#ffffff" stroke="#ff9900" stroke-width="2" />
    <text x="400" y="392" font-family="sans-serif" font-size="16" font-weight="bold" fill="#2c699a" text-anchor="middle">BIOGÁS CH₄</text>
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">GENERADOR DE METANO (BIODIGESTOR)</text>
  </g>
</svg>