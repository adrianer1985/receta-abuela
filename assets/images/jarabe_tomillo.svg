<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffaf0" />
      <stop offset="100%" stop-color="#ffeed6" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Honey Jar in background -->
    <path d="M 220,320 L 340,320 L 320,480 A 15,15 0 0 1 305,495 L 255,495 A 15,15 0 0 1 240,480 Z" fill="#ffb300" stroke="#d4a373" stroke-width="3" opacity="0.8" />
    <rect x="240" y="290" width="80" height="30" rx="5" fill="#b07c65" />
    
    <!-- Thyme leaves on background jar -->
    <path d="M 280,320 Q 280,450 280,490" fill="none" stroke="#2c4e3d" stroke-width="2" />
    
    <!-- Medicine glass dropper bottle (foreground) -->
    <g transform="translate(420, 240)">
      <rect x="0" y="0" width="110" height="240" rx="15" fill="rgba(60, 40, 20, 0.9)" stroke="#1a0a00" stroke-width="4" />
      <!-- White Medicine Label -->
      <rect x="10" y="70" width="90" height="120" rx="5" fill="#ffffff" />
      <rect x="20" y="90" width="70" height="20" fill="#2c4e3d" />
      <line x1="20" y1="130" x2="80" y2="130" stroke="#b07c65" stroke-width="3" />
      <line x1="20" y1="150" x2="60" y2="150" stroke="#b07c65" stroke-width="3" />
      
      <!-- Collar and Pipette dropper cap -->
      <rect x="30" y="-20" width="50" height="20" fill="#303030" />
      <path d="M 35,-20 C 35,-45 75,-45 75,-20" fill="#ff4500" />
    </g>
    
    <!-- Fresh Thyme twigs (green leaves) -->
    <g transform="translate(380, 480) rotate(45)">
      <path d="M 0,0 C 20,-80 40,-120 60,-160" fill="none" stroke="#2c4e3d" stroke-width="4" stroke-linecap="round" />
      <circle cx="20" cy="-60" r="10" fill="#55a630" />
      <circle cx="35" cy="-100" r="9" fill="#55a630" />
      <circle cx="50" cy="-130" r="8" fill="#55a630" />
      <circle cx="15" cy="-80" r="9" fill="#78b159" />
      <circle cx="30" cy="-120" r="8" fill="#78b159" />
    </g>
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">JARABE DE TOMILLO Y MIEL</text>
  </g>
</svg>