<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffcf0" />
      <stop offset="100%" stop-color="#f5ebd0" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b0b0b0" />
      <stop offset="50%" stop-color="#e8e8e8" />
      <stop offset="100%" stop-color="#800000" stop-color="#808080" />
    </linearGradient>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Hexagonal Honeycomb cells (decorative background) -->
    <g opacity="0.1" stroke="#b07c65" stroke-width="3" fill="none">
      <polygon points="120,200 170,170 220,200 220,260 170,290 120,260" />
      <polygon points="170,290 220,260 270,290 270,350 220,380 170,350" />
      <polygon points="220,200 270,170 320,200 320,260 270,290 220,260" />
    </g>
    
    <!-- Olive Branch -->
    <path d="M 450,200 Q 550,280 620,400" fill="none" stroke="#52705e" stroke-width="4" />
    <!-- Olive leaves -->
    <path d="M 520,250 C 550,230 580,240 590,270 C 560,280 530,270 520,250 Z" fill="#7b9987" stroke="#2c4e3d" stroke-width="2" />
    <path d="M 570,310 C 600,290 630,300 640,330 C 610,340 580,330 570,310 Z" fill="#7b9987" stroke="#2c4e3d" stroke-width="2" />
    <!-- Olives -->
    <circle cx="530" cy="280" r="16" fill="#3a5f0b" stroke="#1d3005" stroke-width="2" />
    <circle cx="585" cy="345" r="16" fill="#3a5f0b" stroke="#1d3005" stroke-width="2" />
    
    <!-- Cosmetic Tin / Jar (yellow ointment) -->
    <rect x="240" y="360" width="220" height="160" rx="20" fill="url(#metalGrad)" stroke="#606060" stroke-width="4" />
    <ellipse cx="350" cy="360" rx="110" ry="25" fill="#a0a0a0" stroke="#606060" stroke-width="4" />
    <ellipse cx="350" cy="360" rx="100" ry="18" fill="#ffd54f" /> <!-- Ointment -->
    <!-- Swirl in ointment -->
    <path d="M 310,360 Q 350,375 390,360" fill="none" stroke="#ffb300" stroke-width="4" stroke-linecap="round" />
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">UNGÜENTO DE CERA Y OLIVA</text>
  </g>
</svg>