<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f8f5" />
      <stop offset="100%" stop-color="#e2e6de" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Wooden Floor background elements -->
    <g opacity="0.15" stroke="#2c4e3d" stroke-width="2">
      <line x1="100" y1="580" x2="700" y2="580" />
      <line x1="100" y1="640" x2="700" y2="640" />
    </g>

    <!-- Metal/Wooden Bucket -->
    <path d="M 280,360 L 520,360 L 480,580 A 20,20 0 0 1 460,600 L 340,600 A 20,20 0 0 1 320,580 Z" fill="#7b9987" stroke="#2c4e3d" stroke-width="4" />
    <ellipse cx="400" cy="360" rx="120" ry="25" fill="#52705e" stroke="#2c4e3d" stroke-width="4" />
    <ellipse cx="400" cy="360" rx="100" ry="18" fill="#aaccb8" opacity="0.8" /> <!-- water -->
    <path d="M 280,360 C 270,300 530,300 520,360" fill="none" stroke="#8e9a93" stroke-width="6" /> <!-- Handle -->
    
    <!-- Rosemary branches in bucket -->
    <path d="M 440,360 Q 480,240 520,180" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 460,300 L 490,290 M 470,270 L 505,255 M 480,240 L 515,220 M 495,210 L 530,195" stroke="#2c4e3d" stroke-width="3" stroke-linecap="round" />
    
    <!-- Lavender branch -->
    <path d="M 350,360 Q 300,220 280,160" fill="none" stroke="#52705e" stroke-width="3" />
    <circle cx="280" cy="160" r="10" fill="#a385e0" />
    <circle cx="285" cy="180" r="9" fill="#a385e0" />
    <circle cx="275" cy="200" r="9" fill="#8d66cc" />
    
    <!-- Mop Head lying down -->
    <path d="M 540,550 C 530,520 630,500 640,540 L 610,580 Z" fill="#f0e6d2" stroke="#b07c65" stroke-width="3" />
    <line x1="590" y1="520" x2="680" y2="380" stroke="#b07c65" stroke-width="6" stroke-linecap="round" />
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">FRIEGASUELOS DE HIERBAS AROMÁTICAS</text>
  </g>
</svg>