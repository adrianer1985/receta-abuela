<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef9ff" />
      <stop offset="100%" stop-color="#ccefff" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Water Bubbles Background -->
    <circle cx="200" cy="200" r="15" fill="none" stroke="#80d8ff" stroke-width="2" opacity="0.5" />
    <circle cx="600" cy="300" r="25" fill="none" stroke="#80d8ff" stroke-width="2" opacity="0.4" />
    <circle cx="250" cy="500" r="8" fill="none" stroke="#80d8ff" stroke-width="2" opacity="0.6" />
    
    <!-- Glass Jar -->
    <path d="M 280,240 Q 280,300 240,320 L 240,560 A 20,20 0 0 0 260,580 L 440,580 A 20,20 0 0 0 460,560 L 460,320 Q 420,300 420,240 Z" fill="rgba(255, 255, 255, 0.7)" stroke="#80d8ff" stroke-width="3" />
    <rect x="310" y="200" width="80" height="40" rx="5" fill="#2c4e3d" /> <!-- lid -->
    
    <!-- White round pills inside -->
    <g transform="translate(350, 480)">
      <circle cx="-50" cy="50" r="40" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" />
      <circle cx="-35" cy="35" r="30" fill="#fafafa" opacity="0.9" />
      
      <circle cx="40" cy="50" r="40" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" />
      <circle cx="55" cy="35" r="30" fill="#fafafa" opacity="0.9" />

      <circle cx="-10" cy="10" r="40" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" />
      <circle cx="5" cy="-5" r="30" fill="#ffffff" opacity="0.9" />
    </g>
    
    <!-- Efervescent fizz effect around a pill outside the jar -->
    <g transform="translate(560, 480)">
      <!-- Effervescent bubbles -->
      <circle cx="-60" cy="-40" r="8" fill="#ffffff" opacity="0.8" />
      <circle cx="-40" cy="-70" r="6" fill="#ffffff" opacity="0.7" />
      <circle cx="50" cy="-50" r="10" fill="#ffffff" opacity="0.9" />
      <circle cx="20" cy="-80" r="5" fill="#ffffff" opacity="0.6" />
      
      <!-- Active Pill -->
      <circle cx="0" cy="0" r="45" fill="#ffffff" stroke="#00b0ff" stroke-width="3" filter="url(#glow)" />
      <circle cx="0" cy="0" r="45" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" />
      <path d="M -20,-10 C -10,-20 10,-20 20,-10" fill="none" stroke="#00b0ff" stroke-width="3" opacity="0.4" />
    </g>
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">PASTILLAS EFERVESCENTES DE WC</text>
  </g>
</svg>