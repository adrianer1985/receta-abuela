<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#edece8" />
      <stop offset="100%" stop-color="#cfcbc4" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#707070" />
      <stop offset="30%" stop-color="#b8b8b8" />
      <stop offset="70%" stop-color="#909090" />
      <stop offset="100%" stop-color="#505050" />
    </linearGradient>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Ground platform -->
    <rect x="150" y="550" width="500" height="80" rx="10" fill="#8e9a93" stroke="#5e6863" stroke-width="3" />
    
    <!-- Rocket Stove Metal Body (L shape made of cylinders/tin cans) -->
    <!-- Vertical combustion chamber -->
    <path d="M 330,280 L 470,280 L 470,550 L 330,550 Z" fill="url(#metalGrad)" stroke="#4a4a4a" stroke-width="4" />
    <!-- Horizontal fuel chamber (twig entrance) -->
    <path d="M 470,430 L 590,430 L 590,530 L 470,530" fill="url(#metalGrad)" stroke="#4a4a4a" stroke-width="4" />
    <!-- Welded lines -->
    <line x1="470" y1="430" x2="470" y2="530" stroke="#303030" stroke-width="3" />
    
    <!-- Fire Grate / opening -->
    <rect x="520" y="450" width="70" height="60" rx="5" fill="#1a1a1a" />
    
    <!-- Burning twigs poking out of the horizontal tube -->
    <line x1="500" y1="480" x2="620" y2="480" stroke="#8B5A2B" stroke-width="12" stroke-linecap="round" />
    <line x1="480" y1="500" x2="630" y2="500" stroke="#8B5A2B" stroke-width="10" stroke-linecap="round" />
    
    <!-- Clean, powerful vertical flame rising from the top vertical chimney -->
    <g filter="url(#glow)">
      <!-- Flame outer -->
      <path d="M 350,280 C 330,160 400,60 400,60 C 400,60 470,160 450,280 Z" fill="#ff4500" opacity="0.8" />
      <!-- Flame inner core -->
      <path d="M 370,280 C 360,190 400,120 400,120 C 400,120 440,190 430,280 Z" fill="#ffcc00" />
      <!-- Flame blue base -->
      <ellipse cx="400" cy="275" rx="40" ry="12" fill="#00b0ff" opacity="0.7" />
    </g>
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">ESTUFA ROCKET DE LATAS DE METAL</text>
  </g>
</svg>