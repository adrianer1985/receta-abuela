<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f9f6" />
      <stop offset="100%" stop-color="#d5ebd9" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Cinchona bark logs (Quina) background -->
    <rect x="200" y="460" width="220" height="50" rx="10" fill="#7a5230" stroke="#4a311c" stroke-width="3" transform="rotate(-15, 310, 485)" />
    <rect x="230" y="500" width="200" height="40" rx="8" fill="#5c3d24" stroke="#3d2817" stroke-width="3" transform="rotate(-8, 330, 520)" />
    
    <!-- Rosemary leaves -->
    <g transform="translate(560, 480)">
      <path d="M 0,0 Q -60,-80 -120,-120" fill="none" stroke="#2c4e3d" stroke-width="4" />
      <line x1="-30" y1="-40" x2="-60" y2="-30" stroke="#2c4e3d" stroke-width="3" stroke-linecap="round" />
      <line x1="-60" y1="-70" x2="-95" y2="-65" stroke="#2c4e3d" stroke-width="3" stroke-linecap="round" />
      <line x1="-80" y1="-90" x2="-115" y2="-90" stroke="#2c4e3d" stroke-width="3" stroke-linecap="round" />
    </g>
    
    <!-- Amber spray bottle (front) -->
    <g transform="translate(420, 220)">
      <!-- Glass bottle body -->
      <path d="M 25,70 Q 25,30 5,10 L 5,-10 L 75,-10 L 75,10 Q 55,30 55,70 L 55,260 A 15,15 0 0 1 40,275 L -10,275 A 15,15 0 0 1 -25,260 Z" fill="rgba(90, 55, 20, 0.9)" stroke="#1a0a00" stroke-width="3" />
      <rect x="-15" y="70" width="110" height="170" fill="#ffffff" /> <!-- white label -->
      <rect x="-5" y="90" width="90" height="25" fill="#2c4e3d" />
      <line x1="-5" y1="140" x2="85" y2="140" stroke="#52705e" stroke-width="3" />
      <line x1="-5" y1="160" x2="65" y2="160" stroke="#52705e" stroke-width="3" />
      
      <!-- Spray Trigger Cap -->
      <rect x="15" y="-30" width="50" height="20" fill="#303030" />
      <path d="M 20,-30 L 20,-50 L 5,-50 L 0,-40 L -15,-40 L -15,-55 L 75,-55 L 75,-30 Z" fill="#303030" stroke="#101010" stroke-width="1.5" />
      <path d="M 5,-30 L 5,-5" stroke="#303030" stroke-width="4" stroke-linecap="round" /> <!-- trigger handle -->
    </g>
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">TÓNICO DE ROMERO Y QUINA</text>
  </g>
</svg>