<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3f7f4" />
      <stop offset="100%" stop-color="#dae7de" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Large Ribbed Plantain Leaves in background -->
    <g transform="translate(300, 360) rotate(-30)">
      <!-- Oval Leaf shape -->
      <path d="M 0,0 C -60,-120 -60,-240 0,-300 C 60,-240 60,-120 0,0 Z" fill="#55a630" stroke="#2c4e3d" stroke-width="3" />
      <!-- Characteristic Ribs (vertical parallel veins) -->
      <path d="M 0,0 Q -30,-150 0,-300 M 0,0 Q 30,-150 0,-300 M 0,0 Q -15,-150 0,-300 M 0,0 Q 15,-150 0,-300" fill="none" stroke="#2c4e3d" stroke-width="1.5" />
    </g>
    
    <g transform="translate(500, 420) rotate(20) scale(0.8)">
      <path d="M 0,0 C -60,-120 -60,-240 0,-300 C 60,-240 60,-120 0,0 Z" fill="#78b159" stroke="#2c4e3d" stroke-width="3" />
      <path d="M 0,0 Q -30,-150 0,-300 M 0,0 Q 30,-150 0,-300 M 0,0 Q -15,-150 0,-300 M 0,0 Q 15,-150 0,-300" fill="none" stroke="#2c4e3d" stroke-width="1.5" />
    </g>
    
    <!-- Ointment Jar (foreground) -->
    <g transform="translate(250, 360)">
      <rect x="0" y="0" width="220" height="180" rx="25" fill="rgba(255, 255, 255, 0.85)" stroke="#2c4e3d" stroke-width="4" />
      <rect x="-10" y="-30" width="240" height="40" rx="8" fill="#b07c65" stroke="#7a5230" stroke-width="3" /> <!-- Cork Lid -->
      
      <!-- Green herbal cream inside jar -->
      <path d="M 15,150 L 205,150 L 205,60 Q 110,40 15,60 Z" fill="#76a035" opacity="0.9" />
      <!-- Label -->
      <rect x="40" y="70" width="140" height="60" rx="5" fill="#fcfbf9" stroke="#7b9987" stroke-width="2" />
      <text x="110" y="105" font-family="sans-serif" font-size="16" font-weight="bold" fill="#2c4e3d" text-anchor="middle">LLANTÉN</text>
    </g>
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">POMADA NATURAL DE LLANTÉN</text>
  </g>
</svg>