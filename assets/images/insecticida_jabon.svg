<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7faf5" />
      <stop offset="100%" stop-color="#e4f0dc" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Garden Leaf with tiny aphids (bugs) -->
    <g transform="translate(420, 420)">
      <path d="M 0,0 C 150,-100 200,50 150,150 C 50,150 -100,100 0,0 Z" fill="#80cc28" stroke="#2c4e3d" stroke-width="4" />
      <path d="M 0,0 Q 80,60 150,150" fill="none" stroke="#2c4e3d" stroke-width="3" />
      
      <!-- Aphids (tiny black/green dots) -->
      <circle cx="80" cy="40" r="3" fill="#1b3528" />
      <circle cx="95" cy="50" r="3.5" fill="#1b3528" />
      <circle cx="65" cy="65" r="3" fill="#1b3528" />
      
      <circle cx="110" cy="85" r="3.5" fill="#1b3528" opacity="0.2" /> <!-- dying/washed away -->
      <circle cx="130" cy="115" r="3" fill="#1b3528" opacity="0.1" />
    </g>
    
    <!-- Spray Bottle delivering mist -->
    <g transform="translate(140, 140)">
      <rect x="50" y="150" width="100" height="220" rx="15" fill="rgba(255, 255, 255, 0.9)" stroke="#2c4e3d" stroke-width="3" />
      <rect x="60" y="180" width="80" height="170" fill="#ffd54f" opacity="0.4" /> <!-- Potassium soap yellow tint -->
      
      <!-- Trigger Mechanism -->
      <path d="M 100,150 L 100,100 L 70,100 L 60,120 L 40,120 L 30,90 L 120,90 L 120,150 Z" fill="#2c4e3d" stroke="#2c4e3d" stroke-width="2" />
      <path d="M 60,100 L 60,140" stroke="#2c4e3d" stroke-width="4" stroke-linecap="round" />
      <rect x="20" y="93" width="10" height="10" fill="#b07c65" />
    </g>
    
    <!-- Spray Mist (soft white vector clouds + bubbles) -->
    <g stroke="none" fill="#ffffff" opacity="0.7">
      <circle cx="210" cy="210" r="15" filter="url(#glow)" />
      <circle cx="250" cy="225" r="25" filter="url(#glow)" />
      <circle cx="300" cy="240" r="35" filter="url(#glow)" />
    </g>
    <circle cx="270" cy="270" r="5" fill="none" stroke="#2c4e3d" stroke-width="1" />
    <circle cx="290" cy="200" r="8" fill="none" stroke="#2c4e3d" stroke-width="1.5" />
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">INSECTICIDA DE JABÓN POTÁSICO</text>
  </g>
</svg>