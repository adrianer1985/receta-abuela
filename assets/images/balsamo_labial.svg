<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff0f5" />
      <stop offset="100%" stop-color="#f7dae3" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cccccc" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#999999" />
    </linearGradient>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Cocoa pod / beans in background -->
    <g transform="translate(230, 480) rotate(-20) scale(0.9)">
      <ellipse cx="0" cy="0" rx="60" ry="30" fill="#8B5A2B" stroke="#4a311c" stroke-width="3" />
      <line x1="-60" y1="0" x2="60" y2="0" stroke="#4a311c" stroke-width="2" />
    </g>
    
    <!-- Mint leaves -->
    <g transform="translate(560, 480) scale(0.9)">
      <path d="M 0,0 C -30,-30 -60,-10 -50,20 C -20,25 -5,10 0,0" fill="#55a630" stroke="#2c4e3d" stroke-width="2" />
      <path d="M 0,0 C 30,-30 60,-10 50,20 C 20,25 5,10 0,0" fill="#80cc28" stroke="#2c4e3d" stroke-width="2" />
    </g>
    
    <!-- Round Aluminium Lip Balm Tin (open) -->
    <!-- Lid leaning on tin -->
    <circle cx="450" cy="380" r="85" fill="url(#metalGrad)" stroke="#808080" stroke-width="3" />
    <circle cx="450" cy="380" r="70" fill="#b07c65" opacity="0.2" />
    
    <!-- Balm base tin -->
    <circle cx="350" cy="400" r="85" fill="url(#metalGrad)" stroke="#808080" stroke-width="4" />
    <!-- Pink balm inside -->
    <circle cx="350" cy="400" r="77" fill="#ff80ab" />
    <circle cx="350" cy="400" r="68" fill="#ff4081" opacity="0.9" />
    <!-- Glossy reflection -->
    <path d="M 300,360 A 65,65 0 0 1 400,360" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.5" />
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">BÁLSAMO LABIAL DE CACAO Y MENTA</text>
  </g>
</svg>