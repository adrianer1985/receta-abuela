<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3f6f4" />
      <stop offset="100%" stop-color="#dae2dd" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Ceramic Bowl -->
    <path d="M 220,380 L 580,380 Q 580,560 400,560 Q 220,560 220,380 Z" fill="#a6bcae" stroke="#2c4e3d" stroke-width="4" />
    <ellipse cx="400" cy="380" rx="180" ry="30" fill="#8ca898" stroke="#2c4e3d" stroke-width="4" />
    
    <!-- Creamy clay paste inside -->
    <ellipse cx="400" cy="390" rx="160" ry="20" fill="#5a7e6a" />
    <!-- Texture waves in clay -->
    <path d="M 300,390 C 340,380 380,400 420,390 C 460,380 480,395 500,390" fill="none" stroke="#466252" stroke-width="4" stroke-linecap="round" />
    
    <!-- Wooden Applicator Brush -->
    <g transform="translate(230, 200) rotate(-20)">
      <rect x="0" y="0" width="30" height="250" rx="10" fill="#d2a373" stroke="#b07c65" stroke-width="2" />
      <rect x="-5" y="240" width="40" height="40" fill="#eaeaea" />
      <!-- Bristles (green clay tipped) -->
      <path d="M -5,280 L 35,280 L 25,330 L 5,330 Z" fill="#5a7e6a" stroke="#2c4e3d" stroke-width="2" />
    </g>
    
    <!-- Dropper bottle of Tea Tree Oil -->
    <g transform="translate(560, 280) rotate(15)">
      <rect x="0" y="0" width="80" height="180" rx="10" fill="#2c4e3d" stroke="#102015" stroke-width="3" />
      <rect x="15" y="-30" width="50" height="30" fill="#ffffff" /> <!-- Cap -->
      <rect x="25" y="-50" width="30" height="20" rx="5" fill="#ff4500" /> <!-- Rubber bulb -->
      <rect x="10" y="40" width="60" height="90" fill="#ffffff" /> <!-- label -->
      <line x1="20" y1="70" x2="60" y2="70" stroke="#55a630" stroke-width="4" />
    </g>
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">MASCARILLA DE ARCILLA VERDE</text>
  </g>
</svg>