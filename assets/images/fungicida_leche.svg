<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2f8f3" />
      <stop offset="100%" stop-color="#d6ebd9" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Giant green leaf -->
    <path d="M 150,450 C 250,200 500,200 650,400 C 550,550 300,550 150,450 Z" fill="#55a630" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,450 Q 400,325 650,400" fill="none" stroke="#2c4e3d" stroke-width="3" />
    <path d="M 300,390 Q 280,330 250,300 M 400,360 Q 420,290 460,260 M 500,380 Q 530,320 580,300" fill="none" stroke="#2c4e3d" stroke-width="2" />
    
    <!-- Spray Bottle -->
    <g transform="translate(180, 150)">
      <rect x="150" y="150" width="100" height="220" rx="15" fill="rgba(255, 255, 255, 0.9)" stroke="#2c4e3d" stroke-width="3" />
      <rect x="160" y="180" width="80" height="170" fill="#ffffff" opacity="0.6" /> <!-- Liquid inside -->
      <!-- Label -->
      <rect x="160" y="240" width="80" height="50" rx="5" fill="#7b9987" />
      <line x1="170" y1="265" x2="230" y2="265" stroke="#ffffff" stroke-width="4" />
      
      <!-- Trigger Mechanism -->
      <path d="M 200,150 L 200,100 L 170,100 L 160,120 L 140,120 L 130,90 L 220,90 L 220,150 Z" fill="#2c4e3d" stroke="#2c4e3d" stroke-width="2" />
      <path d="M 160,100 L 160,140" stroke="#2c4e3d" stroke-width="4" stroke-linecap="round" /> <!-- trigger -->
      <rect x="120" y="93" width="10" height="10" fill="#b07c65" /> <!-- nozzle -->
    </g>
    
    <!-- Water/Milk Drips sprayed -->
    <path d="M 250,220 A 8,8 0 0 1 242,212 C 242,204 250,195 250,195 C 250,195 258,204 258,212 A 8,8 0 0 1 250,220 Z" fill="#ffffff" stroke="#2c4e3d" stroke-width="1.5" />
    <circle cx="230" cy="250" r="4" fill="#ffffff" />
    <circle cx="210" cy="210" r="6" fill="#ffffff" stroke="#2c4e3d" stroke-width="1" />
    <circle cx="280" cy="180" r="3" fill="#ffffff" />
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">FUNGICIDA ORGÁNICO DE LECHE</text>
  </g>
</svg>