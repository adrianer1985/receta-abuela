<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf7f2" />
      <stop offset="100%" stop-color="#eee3d5" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.12" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Decorative Botanical Frame/Details -->
  <g opacity="0.05">
    <circle cx="400" cy="400" r="320" fill="none" stroke="#2c4e3d" stroke-width="8" stroke-dasharray="15,10" />
    <path d="M 150,150 C 200,100 300,100 350,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,150 C 600,100 500,100 450,150" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 150,650 C 200,700 300,700 350,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
    <path d="M 650,650 C 600,700 500,700 450,650" fill="none" stroke="#2c4e3d" stroke-width="4" />
  </g>

  <!-- Main Artwork -->
  <g filter="url(#shadow)">
    
    <!-- Coconut Shell Half -->
    <ellipse cx="330" cy="460" rx="110" ry="90" fill="#7a5230" stroke="#4a311c" stroke-width="5" />
    <ellipse cx="330" cy="460" rx="90" ry="72" fill="#ffffff" />
    <ellipse cx="330" cy="460" rx="80" ry="63" fill="#eaeaea" opacity="0.3" />
    
    <!-- Cosmetic Glass Jar -->
    <rect x="440" y="360" width="160" height="150" rx="15" fill="rgba(255, 255, 255, 0.85)" stroke="#7b9987" stroke-width="3" />
    <rect x="430" y="330" width="180" height="30" rx="8" fill="#2c4e3d" />
    <!-- White paste inside jar -->
    <path d="M 450,490 L 590,490 L 590,410 Q 520,390 450,410 Z" fill="#fcfcfc" opacity="0.9" />
    
    <!-- Wooden Spatula -->
    <path d="M 480,310 L 500,240 C 505,220 525,220 530,240 L 510,310 Z" fill="#d2a373" stroke="#b07c65" stroke-width="2" />
    
    <!-- Mint Leaves -->
    <g transform="translate(390, 520) scale(0.9)">
      <path d="M 0,0 C -30,-30 -60,-10 -50,20 C -20,25 -5,10 0,0" fill="#55a630" stroke="#2c4e3d" stroke-width="2" />
      <path d="M 0,0 C 30,-30 60,-10 50,20 C 20,25 5,10 0,0" fill="#80cc28" stroke="#2c4e3d" stroke-width="2" />
    </g>
    
  </g>

  <!-- Bottom Title Badge -->
  <g transform="translate(400, 720)">
    <rect x="-240" y="-30" width="480" height="60" rx="30" fill="#2c4e3d" />
    <text x="0" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">DESODORANTE DE ACEITE DE COCO</text>
  </g>
</svg>